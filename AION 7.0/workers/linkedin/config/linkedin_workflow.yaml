name: "AION Agency Partner Prospecting"
description: "Targets home-services/real-estate/property-management agency owners (Agency Partner white-label tier) and marketing/consulting agencies (20% recurring affiliate program) in our real Voice Receptionist markets (US/UK/CA/AU). select_template() in sales/outreach.py routes each lead to the matching pitch by industry."

triggers:
  - schedule: "daily 08:00"
  - manual: true

steps:
  - id: search_leads
    agent: "prospect"
    action: linkedin_search
    params:
      keywords: "home services agency OR real estate brokerage OR property management company OR marketing agency OR business consultant"
      filters:
        - industry: ["Facilities Services", "Real Estate", "Property Management", "Consumer Services", "Marketing and Advertising", "Business Consulting and Services"]
        - seniority: ["owner", "founder", "manager", "director", "vp", "ceo"]
        - location: ["United States", "United Kingdom", "Canada", "Australia"]
        - activity: "last_30_days"
      limit: 50

  - id: enrich_leads
    agent: "prospect"
    action: linkedin_enrich
    params:
      fields: ["company_size", "company_industry", "recent_posts"]

  - id: score_leads
    agent: "lead_qualifier"
    action: score_lead
    params:
      thresholds:
        high_score: 80
        medium_score: 50
        low_score: 30

  - id: store_leads
    agent: "lead_qualifier"
    action: save_to_pipeline
    params:
      status: "prospected"

  - id: start_outreach
    agent: "outreach"
    action: start_campaign
    params:
      campaign: "outreach_inicial"
      leads_from: "qualified"
