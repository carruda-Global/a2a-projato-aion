name: Career positioning daily post

on:
  schedule:
    # 08:00 UTC = 05:00 America/Sao_Paulo — fires first, ahead of the 12:00
    # UTC compliance content job, so this format (the only one with real
    # engagement this week per AggregateAnalytics 2026-07-06/12) reliably
    # claims a normal-post slot under the shared 3/day cap instead of losing
    # the race to the higher-volume compliance content mill.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  run-daily-job:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily career-positioning LinkedIn post
        run: |
          curl -sS -X POST "https://engenheiro-producao-ai.onrender.com/api/career-positioning/run-daily-job" \
            -H "X-Admin-Secret: ${{ secrets.MARKETPLACE_ADMIN_SECRET }}" \
            --fail-with-body
