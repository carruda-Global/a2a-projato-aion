<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Reader - Leitor de Imagens</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
  p.sub { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
  .drop-zone { width: 100%; max-width: 600px; min-height: 200px; border: 2px dashed #333; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; padding: 2rem; text-align: center; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #4f8cff; background: rgba(79,140,255,0.08); }
  .drop-zone img { max-width: 100%; max-height: 300px; border-radius: 8px; display: none; }
  .drop-zone.has-image { min-height: auto; border-style: solid; }
  .drop-zone .placeholder { color: #666; font-size: 0.95rem; }
  .drop-zone .placeholder svg { width: 48px; height: 48px; stroke: #555; margin-bottom: 1rem; }
  .drop-zone .placeholder span { display: block; margin-top: 0.5rem; }
  .controls { width: 100%; max-width: 600px; display: flex; gap: 0.75rem; margin-top: 1rem; }
  .controls button { flex: 1; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s; background: #1a1a1a; color: #aaa; }
  .controls button:hover { background: #2a2a2a; }
  .controls button.primary { background: #4f8cff; color: #fff; }
  .controls button.primary:hover { background: #3a7afe; }
  .controls button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .result { width: 100%; max-width: 600px; margin-top: 1.5rem; }
  .result textarea { width: 100%; min-height: 200px; background: #181818; border: 1px solid #2a2a2a; border-radius: 8px; color: #e0e0e0; padding: 1rem; font-size: 0.9rem; font-family: 'Cascadia Code', 'Fira Code', monospace; resize: vertical; }
  .result textarea:focus { outline: none; border-color: #4f8cff; }
  .result .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .result .header label { font-size: 0.85rem; color: #888; }
  .result .header button { background: none; border: none; color: #4f8cff; cursor: pointer; font-size: 0.85rem; }
  .result .header button:hover { text-decoration: underline; }
  .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; }
  .loading { width: 20px; height: 20px; border: 2px solid #333; border-top-color: #4f8cff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badge { font-size: 0.75rem; color: #4f8cff; background: rgba(79,140,255,0.1); padding: 0.25rem 0.5rem; border-radius: 4px; }
</style>
</head>
<body>

<h1>OCR Reader</h1>
<p class="sub">Arraste uma imagem ou clique para selecionar</p>

<div class="drop-zone" id="dropZone">
  <div class="placeholder">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    <span>Clique ou arraste uma imagem aqui</span>
  </div>
  <canvas id="previewCanvas" style="display:none"></canvas>
</div>

<div class="controls">
  <button id="btnPaste">Colar da Área de Transferência</button>
  <button id="btnClear" style="display:none">Limpar</button>
</div>

<div class="error" id="error"></div>

<div class="result" id="result" style="display:none">
  <div class="header">
    <label>Texto extraído <span class="badge" id="langBadge">por</span></label>
    <div style="display:flex;align-items:center;gap:0.5rem">
      <div class="loading" id="loading"></div>
      <button id="btnCopy">Copiar</button>
    </div>
  </div>
  <textarea id="output" readonly></textarea>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const placeholder = dropZone.querySelector('.placeholder');
const previewCanvas = document.getElementById('previewCanvas');
const errorEl = document.getElementById('error');
const resultEl = document.getElementById('result');
const output = document.getElementById('output');
const loading = document.getElementById('loading');
const btnPaste = document.getElementById('btnPaste');
const btnCopy = document.getElementById('btnCopy');
const btnClear = document.getElementById('btnClear');

let currentImage = null;
const TESSERACT_CDN = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';

function showError(msg) {
  errorEl.textContent = msg;
}

function clearError() {
  errorEl.textContent = '';
}

function showLoading() {
  loading.style.display = 'block';
}

function hideLoading() {
  loading.style.display = 'none';
}

async function loadTesseract() {
  if (window.Tesseract) return;
  const script = document.createElement('script');
  script.src = TESSERACT_CDN;
  document.head.appendChild(script);
  await new Promise((resolve, reject) => {
    script.onload = resolve;
    script.onerror = () => reject(new Error('Falha ao carregar Tesseract.js'));
  });
  await Tesseract.initialize();
}

async function extractText(imageSrc) {
  showLoading();
  clearError();
  try {
    await loadTesseract();
    const { data } = await Tesseract.recognize(imageSrc, 'por', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          output.value = `Reconhecendo... ${pct}%`;
        }
      }
    });
    output.value = data.text;
    resultEl.style.display = 'block';
    if (!data.text.trim()) {
      showError('Nenhum texto encontrado na imagem.');
    }
  } catch (err) {
    showError('Erro ao processar: ' + err.message);
  } finally {
    hideLoading();
  }
}

function handleImage(file) {
  if (!file || !file.type.startsWith('image/')) {
    showError('Arquivo inválido. Selecione uma imagem.');
    return;
  }
  currentImage = file;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const src = e.target.result;
    const img = new Image();
    img.onload = async () => {
      previewCanvas.width = Math.min(img.width, 600);
      previewCanvas.height = img.height * (previewCanvas.width / img.width);
      const ctx = previewCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, previewCanvas.width, previewCanvas.height);
      previewCanvas.style.display = 'block';
      dropZone.classList.add('has-image');
      placeholder.style.display = 'none';
      btnClear.style.display = 'inline-block';
      output.value = 'Processando...';
      resultEl.style.display = 'block';
      await extractText(src);
    };
    img.src = src;
  };
  reader.readAsDataURL(file);
}

dropZone.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => handleImage(e.target.files[0]);
  input.click();
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleImage(e.dataTransfer.files[0]);
});

btnPaste.addEventListener('click', async () => {
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      for (const type of item.types) {
        if (type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], 'paste.png', { type });
          handleImage(file);
          return;
        }
      }
    }
    showError('Nenhuma imagem encontrada na área de transferência.');
  } catch {
    showError('Não foi possível acessar a área de transferência. Cole a imagem manualmente.');
  }
});

btnClear.addEventListener('click', () => {
  currentImage = null;
  previewCanvas.style.display = 'none';
  dropZone.classList.remove('has-image');
  placeholder.style.display = 'flex';
  btnClear.style.display = 'none';
  resultEl.style.display = 'none';
  output.value = '';
  clearError();
});

btnCopy.addEventListener('click', () => {
  output.select();
  navigator.clipboard.writeText(output.value).then(() => {
    btnCopy.textContent = 'Copiado!';
    setTimeout(() => { btnCopy.textContent = 'Copiar'; }, 2000);
  });
});

output.addEventListener('focus', () => output.select());
</script>
</body>
</html>
